<script>
// ---- Scroll Reveal ----
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// ---- Active Nav Link ----
const sections = document.querySelectorAll('.section[id]');
const navLinks = document.querySelectorAll('.nav-links a');
const navObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      navLinks.forEach(link => {
        link.classList.toggle('active', link.getAttribute('href') === '#' + entry.target.id);
      });
    }
  });
}, { threshold: 0.2, rootMargin: '-80px 0px -60% 0px' });
sections.forEach(s => navObserver.observe(s));

// ---- Animated Number Counters ----
const counterObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const el = entry.target;
      if (el.dataset.counted) return;
      el.dataset.counted = 'true';
      const target = parseFloat(el.dataset.target);
      const prefix = el.dataset.prefix || '';
      const suffix = el.dataset.suffix || '';
      const decimals = parseInt(el.dataset.decimals || '0');
      const duration = 1200;
      const start = performance.now();
      function animate(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = target * eased;
        el.textContent = prefix + current.toFixed(decimals) + suffix;
        if (progress < 1) requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    }
  });
}, { threshold: 0.3 });
document.querySelectorAll('.counter-num[data-target]').forEach(el => counterObserver.observe(el));

// ---- Valuation Calculator ----
const ebitdaSlider = document.getElementById('ebitda-slider');
const multipleSlider = document.getElementById('multiple-slider');
const sharesSlider = document.getElementById('shares-slider');
const ebitdaDisplay = document.getElementById('ebitda-display');
const multipleDisplay = document.getElementById('multiple-display');
const sharesDisplay = document.getElementById('shares-display');
const calcPrice = document.getElementById('calc-price');
const calcMoic = document.getElementById('calc-moic');
const calcIrr = document.getElementById('calc-irr');

function updateCalculator() {
  const ebitda = parseFloat(ebitdaSlider.value);
  const multiple = parseFloat(multipleSlider.value);
  const shares = parseFloat(sharesSlider.value);

  ebitdaDisplay.textContent = '$' + (ebitda / 1000).toFixed(2) + 'B';
  multipleDisplay.textContent = multiple.toFixed(1) + 'x';
  sharesDisplay.textContent = shares + 'M';

  const ev = ebitda * multiple;
  const netDebt = 3200;
  const equityValue = ev - netDebt;
  const impliedPrice = equityValue / shares;
  const moic = impliedPrice / 42.56;
  const irr = (Math.pow(moic, 1/5) - 1) * 100;

  calcPrice.textContent = '$' + Math.round(impliedPrice);
  calcMoic.textContent = moic.toFixed(1) + 'x';
  calcIrr.textContent = Math.round(irr) + '%';
}

ebitdaSlider.addEventListener('input', updateCalculator);
multipleSlider.addEventListener('input', updateCalculator);
sharesSlider.addEventListener('input', updateCalculator);
updateCalculator();

// ---- Chart.js Global Config (Dark Theme) ----
Chart.defaults.color = '#8892A4';
Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
Chart.defaults.font.family = "'Satoshi', sans-serif";
Chart.defaults.font.size = 12;

const chartTooltipConfig = {
  backgroundColor: '#131929',
  borderColor: 'rgba(0,196,161,0.3)',
  borderWidth: 1,
  titleColor: '#F0F4FF',
  bodyColor: '#8892A4',
  padding: 12,
  cornerRadius: 6,
};

// ---- Deleverage Chart ----

if (dlCtx) {

      datasets: [{
        label: 'Net Leverage (x)',
        data: [3.69, 3.73, 3.53, 3.06, 2.99, 2.72, 2.38, 2.20, 2.00],
        backgroundColor: function(ctx) {
          const val = ctx.raw;
          if (val >= 3.5) return 'rgba(224, 85, 85, 0.6)';
          if (val >= 3.0) return 'rgba(232, 184, 75, 0.6)';
          return 'rgba(0, 196, 161, 0.5)';
        },
        borderColor: function(ctx) {
          const val = ctx.raw;
          if (val >= 3.5) return 'rgba(224, 85, 85, 0.9)';
          if (val >= 3.0) return 'rgba(232, 184, 75, 0.9)';
          return 'rgba(0, 196, 161, 0.9)';
        },
        borderWidth: 1,
        borderRadius: 4,
        borderSkipped: false,
        barPercentage: 0.7,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 2.2,
      plugins: {
        legend: { display: false },
        tooltip: {
          ...chartTooltipConfig,
          callbacks: { label: function(ctx) { return 'Leverage: ' + ctx.raw.toFixed(2) + 'x'; } }
        }
      },
      scales: {
        y: { beginAtZero: false, min: 1.5, max: 4.0, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v => v.toFixed(1) + 'x', font: { size: 11 }, color: '#8892A4' } },
        x: { grid: { display: false }, ticks: { font: { size: 11, weight: 500 }, color: '#8892A4' } }
      }
    }
  });
}

        y1: { position: 'right', beginAtZero: true, grid: { display: false }, ticks: { callback: v => '$' + v.toFixed(2), font: { size: 11 }, color: '#E8B84B' }, title: { display: true, text: 'FCF/Share ($)', color: '#E8B84B', font: { size: 11 } } },
        x: { grid: { display: false }, ticks: { font: { size: 12, weight: 600 }, color: '#F0F4FF' } }

    }

    { x: 8,  y: 67, r: 15, label: '$11.2M' },

  new Chart(insCtx, {

          backgroundColor: 'rgba(0,196,161,0.05)',
          borderWidth: 2, pointRadius: 2, fill: true, tension: 0.4,

        {
          label: 'Isaacman Open-Market Buy',
          data: buys.map(b => ({ x: b.x, y: b.y, r: b.r })),
          type: 'bubble',
          backgroundColor: 'rgba(232, 184, 75, 0.4)',
          borderColor: 'rgba(232, 184, 75, 0.9)',

          callbacks: {

</script>

<script>

    document.getElementById('progress-bar').style.width = scrolled + '%';
  });
</script>
